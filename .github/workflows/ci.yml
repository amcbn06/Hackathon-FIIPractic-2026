name: CI Pipeline

# Trigger the workflow on pushes and pull requests to the main branch
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    # 1. Grab your code from the repository
    - name: Checkout repository
      uses: actions/checkout@v4

    # 2. Set up the Python environment
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.10" # Change this to match your project's version
        cache: 'pip'           # Caches dependencies to make future runs faster

    # 3. Install dependencies (Matches your local setup)
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        # Install testing tools if they aren't in your requirements.txt
        pip install pytest flake8

    # 4. Check for basic Python syntax errors
    - name: Lint with flake8
      run: |
        # Stop the build if there are Python syntax errors or undefined names
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics

    # 5. Run tests (if you have them)
    - name: Run tests
      env:
        # Mock your .env file here so the backend doesn't crash during testing
        JWT_SECRET: "dummy_secret_for_ci_environment" 
      run: |
        # Assuming you have tests in your backend/tests/ folder. 
        # If you don't use pytest yet, you can comment this step out.
        # pytest backend/tests/

    # 6. Verify Streamlit Syntax (Optional but helpful)
    - name: Verify Frontend Syntax
      run: |
        # This just checks if the Streamlit app can be compiled without syntax errors
        python -m py_compile frontend/app.py